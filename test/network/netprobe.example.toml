# Copy this file to netprobe.toml, then set iperf_host to the public IP or
# hostname of your controlled VPS. All intervals are in seconds.

[probe]
ping_interval = 2
ping_timeout = 1
dns_interval = 60
http_interval = 60
link_interval = 10
route_interval = 300
mtr_interval = 3600
public_ip_interval = 300
throughput_interval = 21600
throughput_bytes = "50M"
throughput_timeout = 300
iperf_host = ""
iperf_port = 5201
mtr_cycles = 20
public_ip_url = "https://api.ipify.org"

[[ping_targets]]
label = "cloudflare"
address = "1.1.1.1"
scope = "internet"

[[ping_targets]]
label = "google"
address = "8.8.8.8"
scope = "internet"

[[ping_targets]]
label = "quad9"
address = "9.9.9.9"
scope = "internet"

[[dns_tests]]
label = "system-resolver"
resolver = ""
name = "example.com"

[[dns_tests]]
label = "cloudflare-dns"
resolver = "1.1.1.1"
name = "example.com"

[[dns_tests]]
label = "google-dns"
resolver = "8.8.8.8"
name = "example.com"

[[http_tests]]
label = "cloudflare-connectivity"
url = "https://cp.cloudflare.com/generate_204"

[[http_tests]]
label = "google-connectivity"
url = "https://connectivitycheck.gstatic.com/generate_204"

[[mtr_targets]]
label = "cloudflare"
address = "1.1.1.1"

